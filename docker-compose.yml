services:
  httpd:
      image: httpd:2.4-trixie
      container_name: episciences-httpd
      build:
        context: .
        dockerfile: src/apache/Dockerfile
      restart: always
      volumes:
        - ./src/apache/vhost.conf:/usr/local/apache2/conf/extra/episciences.conf
        - .:/var/www/htdocs
        - ./data:/var/www/data
        - ./cache:/var/www/cache
        - ./logs:/var/www/logs
      depends_on:
        - php-fpm
      networks:
        - epi-network
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.epi-gpl-httpd.loadbalancer.server.port=80"
        - "traefik.http.middlewares.epi-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.epi-https-redirect.redirectscheme.permanent=true"
        - "traefik.http.routers.epi-journal.rule=Host(`dev.episciences.org`)"
        - "traefik.http.routers.epi-journal.entrypoints=websecure"
        - "traefik.http.routers.epi-journal.tls=true"
        - "traefik.http.routers.epi-journal.service=epi-gpl-httpd"
        - "traefik.http.routers.epi-journal-http.rule=Host(`dev.episciences.org`)"
        - "traefik.http.routers.epi-journal-http.entrypoints=web"
        - "traefik.http.routers.epi-journal-http.middlewares=epi-https-redirect"
        - "traefik.http.routers.epi-oai.rule=Host(`oai-dev.episciences.org`)"
        - "traefik.http.routers.epi-oai.entrypoints=websecure"
        - "traefik.http.routers.epi-oai.tls=true"
        - "traefik.http.routers.epi-oai.service=epi-gpl-httpd"
        - "traefik.http.routers.epi-oai-http.rule=Host(`oai-dev.episciences.org`)"
        - "traefik.http.routers.epi-oai-http.entrypoints=web"
        - "traefik.http.routers.epi-oai-http.middlewares=epi-https-redirect"
        - "traefik.http.routers.epi-portal.rule=Host(`data-dev.episciences.org`)"
        - "traefik.http.routers.epi-portal.entrypoints=websecure"
        - "traefik.http.routers.epi-portal.tls=true"
        - "traefik.http.routers.epi-portal.service=epi-gpl-httpd"
        - "traefik.http.routers.epi-portal-http.rule=Host(`data-dev.episciences.org`)"
        - "traefik.http.routers.epi-portal-http.entrypoints=web"
        - "traefik.http.routers.epi-portal-http.middlewares=epi-https-redirect"
        - "traefik.http.routers.epi-gpl-manager.rule=Host(`manager-dev.episciences.org`)"
        - "traefik.http.routers.epi-gpl-manager.entrypoints=websecure"
        - "traefik.http.routers.epi-gpl-manager.tls=true"
        - "traefik.http.routers.epi-gpl-manager.service=epi-gpl-httpd"
        - "traefik.http.routers.epi-gpl-manager-http.rule=Host(`manager-dev.episciences.org`)"
        - "traefik.http.routers.epi-gpl-manager-http.entrypoints=web"
        - "traefik.http.routers.epi-gpl-manager-http.middlewares=epi-https-redirect"
      command: >
        /bin/sh -c "chown -R www-data:www-data /var/www/data /var/www/cache /var/www/logs && httpd-foreground"


  php-fpm:
    container_name: episciences-php-fpm
    build:
      context: .
      dockerfile: src/php-fpm/Dockerfile
    restart: always
    volumes:
        - .:/var/www/htdocs
        - ./data:/var/www/data
        - ./cache:/var/www/cache
        - ./logs:/var/www/logs
        - ./src/php-fpm/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-custom.conf
        - ./logs/xdebug.log:/var/www/logs/xdebug.log
    environment:
        - PHP_FPM_LISTEN_PORT=9000
        - XDEBUG_MODE=debug
        - XDEBUG_CONFIG=client_host=host.docker.internal client_port=9003 start_with_request=yes
        - COMPOSER_HOME=/tmp/composer
        - SMTP_HOST=mailpit
        - SMTP_PORT=1025
    extra_hosts:
        - "host.docker.internal:host-gateway"
        - "api-dev.episciences.org:172.19.0.11"
    expose:
        - "9000"
    networks:
        - epi-network
    dns:
        - 8.8.8.8
        - 1.1.1.1

networks:
  epi-network:
    external: true